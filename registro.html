<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymFlow - Registro</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-green-box {
            background-color: #bfff00;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    
        .dumbbell {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 10px;
            position: relative;
        }
        .dumbbell-bar {
            width: 14px;
            height: 2px;
            background-color: #111827;
            position: absolute;
        }
        .dumbbell::before, .dumbbell::after {
            content: '';
            width: 3px;
            height: 10px;
            background-color: #111827;
            border-radius: 1px;
            position: absolute;
        }
        .dumbbell::before { left: 0; }
        .dumbbell::after { right: 0; }

        .logo-text {
            font-size: 24px;
            font-weight: 750;
            color: #111827;
            letter-spacing: -0.5px;
        }

        /* ----------------------------------------- */

        .subtitle {
            color: #84cc16; 
            font-size: 11px;
            font-weight: bold;
            margin-top: 25px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        h2 {
            margin: 0 0 5px 0;
            font-size: 24px;
            color: #111827;
        }
        .desc {
            color: #6b7280;
            font-size: 14px;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .row {
            display: flex;
            gap: 15px;
        }
        .form-group {
            margin-bottom: 15px;
            flex: 1;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #374151;
        }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #84cc16;
        }
        small {
            color: #9ca3af;
            display: block;
            margin-top: 5px;
            font-size: 12px;
        }
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .checkbox-group label {
            font-weight: normal;
            font-size: 13px;
            color: #374151;
            cursor: pointer;
        }
        .underline {
            text-decoration: underline;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #111827;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
        }
        .btn-submit:hover {
            background-color: #1f2937;
        }
        .footer-text {
            text-align: center;
            font-size: 14px;
            margin-top: 20px;
            color: #374151;
        }
        .footer-text span {
            text-decoration: underline;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <div class="logo-green-box">
                <div class="dumbbell">
                    <div class="dumbbell-bar"></div>
                </div>
            </div>
            <span class="logo-text">GymFlow</span>
        </div>

        <div class="subtitle">Crear cuenta</div>
        <h2>Empieza a entrenar sin filas</h2>
        <p class="desc">Regístrate para gestionar tu membresía desde el teléfono.</p>

        <form>
            <div class="row">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" placeholder="Darianny">
                </div>
                <div class="form-group">
                    <label>Apellidos</label>
                    <input type="text" placeholder="Luciano Veras">
                </div>
            </div>

            <div class="form-group">
                <label>Cédula</label>
                <input type="text" placeholder="001 0000000 0">
                <small>11 dígitos, sin guiones.</small>
            </div>

            <div class="form-group">
                <label>Correo electrónico</label>
                <input type="email" placeholder="tu@correo.com">
            </div>

            <div class="form-group">
                <label>Teléfono</label>
                <input type="text" placeholder="809 000 0000">
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" placeholder="Mínimo 8 caracteres">
                <small>Usa mayúsculas, números y un símbolo.</small>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terminos">
                <label for="terminos">
                    Acepto los <span class="underline">Términos de uso</span> y la <span class="underline">Política de privacidad</span>.
                </label>
            </div>

            <button type="button" class="btn-submit">Crear cuenta</button>
        </form>

        <p class="footer-text">
            ¿Ya tienes cuenta? <a href="login.html" style="font-weight: bold; color: #111827; text-decoration: underline;">Inicia sesión</a>
        </p>
    </div>

</body>
</html>
