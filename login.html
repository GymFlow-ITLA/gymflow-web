<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymFlow - Inicio de Sesión</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-green-box {
            background-color: #bfff00;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .dumbbell {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 10px;
            position: relative;
        }
        .dumbbell-bar {
            width: 14px;
            height: 2px;
            background-color: #111827;
            position: absolute;
        }
        .dumbbell::before, .dumbbell::after {
            content: '';
            width: 3px;
            height: 10px;
            background-color: #111827;
            border-radius: 1px;
            position: absolute;
        }
        .dumbbell::before { left: 0; }
        .dumbbell::after { right: 0; }

        .logo-text {
            font-size: 24px;
            font-weight: 750;
            color: #111827;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #84cc16;
            font-size: 11px;
            font-weight: bold;
            margin-top: 25px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        h2 {
            margin: 0 0 5px 0;
            font-size: 24px;
            color: #111827;
        }
        .desc {
            color: #6b7280;
            font-size: 14px;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #374151;
        }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #84cc16;
        }
        
        /* Enlace de Olvidaste tu contraseña */
        .forgot-link {
            text-align: right;
            margin-top: 5px;
            margin-bottom: 20px;
        }
        .forgot-link span {
            font-size: 13px;
            text-decoration: underline;
            cursor: pointer;
            color: #111827;
            font-weight: 600;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #111827;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
        }
        .btn-submit:hover {
            background-color: #1f2937;
        }

        /* SEPARADOR "O" */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #9ca3af;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e5e7eb;
        }
        .divider:not(:empty)::before { margin-right: .25em; }
        .divider:not(:empty)::after { margin-left: .25em; }

        /* BOTON DE GOOGLE */
        .btn-google {
            width: 100%;
            padding: 12px;
            background-color: #ffffff;
            color: #111827;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-google:hover {
            background-color: #f9fafb;
        }

        .footer-text {
            text-align: center;
            font-size: 14px;
            margin-top: 25px;
            color: #374151;
        }
        .footer-text span {
            text-decoration: underline;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <div class="logo-green-box">
                <div class="dumbbell">
                    <div class="dumbbell-bar"></div>
                </div>
            </div>
            <span class="logo-text">GymFlow</span>
        </div>

        <div class="subtitle">Bienvenido de vuelta</div>
        <h2>Entra a tu cuenta</h2>
        <p class="desc">Gestiona tu membresía y mantente al día.</p>

        <form>
            <div class="form-group">
                <label>Correo electrónico</label>
                <input type="email" placeholder="tu@correo.com">
            </div>

            <div class="form-group" style="margin-bottom: 5px;">
                <label>Contraseña</label>
                <input type="password" placeholder="Tu contraseña">
            </div>

            <div class="forgot-link">
                <span>¿Olvidaste tu contraseña?</span>
            </div>

            <button type="button" class="btn-submit">Iniciar sesión</button>
            
            <div class="divider">o</div>

            <button type="button" class="btn-google">
                <span style="width: 8px; height: 8px; background-color: #ef4444; border-radius: 50%; display: inline-block;"></span>
                Continuar con Google
            </button>
        </form>

        <p class="footer-text">
            ¿Primera vez aquí? <a href="registro.html" style="font-weight: bold; color: #111827; text-decoration: underline;">Crea tu cuenta</a>
        </p>
    </div>

</body>
</html>
